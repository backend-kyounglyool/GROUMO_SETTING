services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=groumo-root-2026
      - MYSQL_USER=groumo
      - MYSQL_PASSWORD=groumo
      - MYSQL_DATABASE=groumo
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgroumo-root-2026"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-dev-data:
